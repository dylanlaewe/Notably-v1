name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ "**" ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: notably
          POSTGRES_PASSWORD: notably
          POSTGRES_DB: notably_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U notably"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql+psycopg://notably:notably@localhost:5432/notably_test
      MINIO_ENABLE: "0"
      RQ_ENABLE: "0"
      WHISPER_ENABLE: "0"
      GPT_ENABLE: "0"
      NOTABLY_ADMIN_TOKEN: "ci-admin"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Wait for Postgres
        run: |
          for i in {1..20}; do
            pg_isready -h localhost -p 5432 -U notably && break
            sleep 1
          done
      
      - name: Initialize DB schema
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python - <<'PY'
          import os, sys
          sys.path.insert(0, os.getcwd())
          from backend.app.db import engine
          from backend.app.models import Base
          Base.metadata.create_all(bind=engine)
          print("DB schema initialized")
          PY


      - name: Run tests
        env:
          DEV_MODE: "true"
          DEV_API_KEY: "test-api"
          NOTABLY_DEV_USER_ID: "11111111-1111-1111-1111-111111111111"
        run: |
          pytest -q
